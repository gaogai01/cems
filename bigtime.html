<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>尖山發電廠機組運轉時數</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f1f5f9;
            color: #1e293b;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 2px 4px -1px rgb(0 0 0 / 0.06);
        }

        /* 藥丸式樣式定義 */
        .pill-status {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.1rem 0.6rem;
            border-radius: 9999px;
            font-weight: 700;
            font-size: 0.65rem;
            letter-spacing: 0.025em;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            line-height: 1.2;
        }
        
        .pill-low { background-color: #ef4444; color: white; }
        .pill-maintenance { background-color: #2563eb; color: white; } /* 改為藍色 */
        .pill-normal { background-color: #e2e8f0; color: #475569; } /* 改為淺灰色 */
        .pill-unit-normal { background-color: #f1f5f9; color: #64748b; border: 1px solid #e2e8f0; } 

        .text-low { color: #dc2626; }
        .text-maintenance { color: #2563eb; } /* 改為藍色 */

        .font-mono-data {
            font-family: 'JetBrains Mono', monospace;
        }

        /* 隱藏滾動條 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="p-2 md:p-4 min-h-screen">
    <div class="max-w-7xl mx-auto">
        <!-- Header Section -->
        <header class="flex flex-col lg:flex-row lg:items-center justify-between mb-4 gap-3">
            <div class="space-y-0.5">
                <div class="flex items-center gap-2">
                    <div class="p-1.5 bg-blue-600 rounded-md shadow-md shadow-blue-200">
                        <i data-lucide="gauge" class="text-white w-5 h-5"></i>
                    </div>
                    <h1 class="text-2xl font-black tracking-tight text-slate-800">
                        尖山發電廠機組運轉時數
                    </h1>
                </div>
                <div class="flex items-center gap-3 px-1">
                    <p class="text-slate-500 font-bold flex items-center gap-1.5 text-[11px]">
                        <span class="inline-block w-1.5 h-1.5 bg-blue-500 rounded-full"></span>
                        運轉組
                    </p>
                    <a href="https://docs.google.com/spreadsheets/d/1-6NiRVNfLzVaqr6775STcrjdy9gyKiHHU1jNewiyUiY/edit?usp=sharing" 
                       target="_blank" 
                       class="text-blue-500 hover:text-blue-700 font-bold text-[10px] flex items-center gap-1 bg-blue-50 px-2 py-0.5 rounded border border-blue-100 transition-colors">
                        <i data-lucide="external-link" class="w-3 h-3"></i>
                        開啟試算表連結
                    </a>
                </div>
            </div>

            <!-- Quick Stats Bar -->
            <div class="flex flex-wrap gap-2">
                <div class="glass-card rounded-xl px-3 py-2 flex items-center gap-3 border-l-4 border-l-indigo-500 min-w-[140px]">
                    <div class="bg-indigo-50 p-1.5 rounded-full text-indigo-600">
                        <i data-lucide="calendar-check" class="w-4 h-4"></i>
                    </div>
                    <div>
                        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest leading-none mb-0.5">抄錶日期</p>
                        <p id="staticDate" class="text-sm font-bold text-slate-700 font-mono-data leading-none">-</p>
                    </div>
                </div>
                <div class="glass-card rounded-xl px-3 py-2 flex items-center gap-3 border-l-4 border-l-emerald-500 min-w-[140px]">
                    <div class="bg-emerald-50 p-1.5 rounded-full text-emerald-600">
                        <i data-lucide="timer" class="w-4 h-4"></i>
                    </div>
                    <div>
                        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest leading-none mb-0.5">大修週期</p>
                        <p id="staticCycle" class="text-sm font-bold text-slate-700 font-mono-data leading-none">-</p>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Table Container -->
        <div class="glass-card rounded-2xl border border-slate-200 overflow-hidden shadow-lg">
            <div id="loadingOverlay" class="py-12 flex flex-col items-center justify-center">
                <div class="w-8 h-8 border-3 border-blue-100 border-t-blue-600 rounded-full animate-spin mb-3"></div>
                <p class="text-slate-500 text-xs font-medium">即時數據讀取中...</p>
            </div>

            <div class="table-wrapper hidden no-scrollbar" id="tableWrapper">
                <table class="w-full text-left border-collapse table-fixed">
                    <thead id="tableHead" class="bg-slate-50 border-b border-slate-200">
                        <!-- Headers -->
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-100 bg-white">
                        <!-- Rows -->
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- Footer -->
        <footer class="mt-4 flex justify-between items-center px-1">
            <div class="flex items-center gap-3">
                <div class="flex items-center gap-1"><span class="w-2.5 h-2.5 bg-slate-300 rounded-full"></span><span class="text-[10px] text-slate-500 font-bold">正常運轉</span></div>
                <div class="flex items-center gap-1"><span class="w-2.5 h-2.5 bg-red-500 rounded-full"></span><span class="text-[10px] text-slate-500 font-bold">低於4小時</span></div>
                <div class="flex items-center gap-1"><span class="w-2.5 h-2.5 bg-blue-600 rounded-full"></span><span class="text-[10px] text-slate-500 font-bold">機組大修</span></div>
                <span class="text-[10px] text-slate-300 mx-1">|</span>
                <span class="text-[10px] text-slate-400 font-bold">監控機組總數: <span id="totalCount" class="font-mono-data font-black text-slate-600">-</span></span>
            </div>
            <p class="text-[9px] text-slate-400 font-black uppercase tracking-tighter">
                TPC JIAN-SHAN POWER PLANT · OPERATION DIVISION
            </p>
        </footer>
    </div>

    <script>
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRpop0v-zlk-fso9sTVe2gp-UxsJhGuANR0PF74psOZy3kTxVFhIg4R7EAhUk70FmMYO4jCeM27xE4v/pub?output=csv";
        
        const EXCLUDE_COLUMNS = ['廠別', '資訊更新日期', '大修週期運轉時數', '本週抄錶日期(date)'];
        const TARGET_HOUR_COLUMN = '平均每日可運轉時數';
        const STATIC_HOUR_COLUMN = '大修週期運轉時數';
        const STATIC_DATE_COLUMN = '本週抄錶日期(date)';

        let rawData = [];
        let filteredHeaders = [];
        let columnMapping = [];

        async function fetchData() {
            showLoading(true);
            try {
                const response = await fetch(SHEET_CSV_URL);
                const csvText = await response.text();
                processCSV(csvText);
                document.getElementById('tableWrapper').classList.remove('hidden');
            } catch (error) {
                console.error("Fetch error", error);
            } finally {
                showLoading(false);
                lucide.createIcons();
            }
        }

        function processCSV(csvText) {
            const lines = csvText.split(/\r?\n/).filter(line => line.trim() !== "");
            if (lines.length < 2) return;

            const allHeaders = lines[0].split(',').map(h => h.replace(/^"|"$/g, '').trim());
            rawData = lines.slice(1).map(line => {
                const matches = line.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
                return (matches || line.split(',')).map(cell => cell.replace(/^"|"$/g, '').trim());
            });

            const cycleIdx = allHeaders.indexOf(STATIC_HOUR_COLUMN);
            const dateIdx = allHeaders.indexOf(STATIC_DATE_COLUMN);
            if (cycleIdx !== -1) document.getElementById('staticCycle').textContent = rawData[0][cycleIdx];
            if (dateIdx !== -1) document.getElementById('staticDate').textContent = rawData[0][dateIdx];

            columnMapping = [];
            filteredHeaders = [];
            allHeaders.forEach((h, index) => {
                if (!EXCLUDE_COLUMNS.includes(h)) {
                    columnMapping.push(index);
                    filteredHeaders.push(h);
                }
            });

            renderTable(rawData);
            document.getElementById('totalCount').textContent = rawData.length;
        }

        function renderTable(dataList) {
            const thead = document.getElementById('tableHead');
            const tbody = document.getElementById('tableBody');
            const colWidth = 100 / filteredHeaders.length;

            thead.innerHTML = `<tr>${filteredHeaders.map(h => `
                <th style="width: ${colWidth}%" class="px-3 py-2 font-bold text-slate-400 text-[10px] uppercase tracking-tighter border-r border-slate-100 last:border-0">
                    ${h}
                </th>
            `).join('')}</tr>`;

            tbody.innerHTML = dataList.map(row => {
                const hourIdx = filteredHeaders.indexOf(TARGET_HOUR_COLUMN);
                const hourValue = row[columnMapping[hourIdx]] || "";
                const numValue = parseFloat(hourValue);
                
                let status = "normal";
                if (hourValue.includes('大修中')) status = "maintenance";
                else if (!isNaN(numValue) && numValue <= 4) status = "low";

                let rowHtml = `<tr class="hover:bg-blue-50/40 transition-colors">`;
                
                columnMapping.forEach((originalIdx, fIdx) => {
                    const headerName = filteredHeaders[fIdx];
                    const value = row[originalIdx] || '-';
                    let cellContent = value;
                    let cellClass = "px-3 py-1.5 text-[11px] border-r border-slate-50 last:border-0 break-all font-medium leading-tight";
                    
                    // 欄位格式：機組標籤
                    if (fIdx === 0) {
                        cellClass += " text-center";
                        let unitPillType = status === "maintenance" ? "pill-maintenance" : (status === "low" ? "pill-low" : "pill-unit-normal");
                        cellContent = `<span class="pill-status ${unitPillType}">${value}</span>`;
                    }

                    // 欄位格式：時數標籤
                    if (headerName === TARGET_HOUR_COLUMN) {
                        cellClass += " text-center";
                        let pillType = status === "maintenance" ? "pill-maintenance" : (status === "low" ? "pill-low" : "pill-normal");
                        cellContent = `<span class="pill-status ${pillType}">${value}</span>`;
                    }

                    rowHtml += `<td class="${cellClass}">${cellContent}</td>`;
                });

                return rowHtml + '</tr>';
            }).join('');
        }

        function showLoading(isLoading) {
            document.getElementById('loadingOverlay').classList.toggle('hidden', !isLoading);
        }

        window.onload = fetchData;
    </script>
</body>
</html>
