<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>尖山發電廠機組運轉時數</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f1f5f9;
            color: #1e293b;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 2px 4px -1px rgb(0 0 0 / 0.06);
        }

        /* 藥丸式樣式定義 */
        .pill-status {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.15rem 0.75rem;
            border-radius: 9999px;
            font-weight: 700;
            font-size: 0.7rem;
            letter-spacing: 0.025em;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            line-height: 1.2;
        }
        
        .pill-low { background-color: #ef4444; color: white; }
        .pill-maintenance { background-color: #2563eb; color: white; }
        .pill-normal { background-color: #e2e8f0; color: #475569; }
        .pill-unit-normal { background-color: #f1f5f9; color: #64748b; border: 1px solid #e2e8f0; } 

        .font-mono-data {
            font-family: 'JetBrains Mono', monospace;
        }

        /* 隱藏滾動條 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 手機模式下的卡片動畫 */
        .mobile-card {
            transition: transform 0.2s;
        }
        .mobile-card:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body class="p-2 md:p-4 min-h-screen">
    <div class="max-w-7xl mx-auto">
        <!-- Header Section -->
        <header class="mb-4">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-3 text-center md:text-left">
                <!-- Title and Date -->
                <div class="flex flex-col md:flex-row items-center gap-3">
                    <div class="flex items-center gap-2">
                        <div class="p-1.5 bg-blue-600 rounded-md shadow-md shadow-blue-200">
                            <i data-lucide="gauge" class="text-white w-5 h-5"></i>
                        </div>
                        <h1 class="text-xl md:text-2xl font-black tracking-tight text-slate-800">
                            尖山發電廠機組運轉時數
                        </h1>
                    </div>
                    <!-- Date Tag -->
                    <div class="flex items-center gap-2 px-2.5 py-1 bg-white border border-slate-200 rounded-lg shadow-sm">
                        <i data-lucide="calendar-check" class="w-3.5 h-3.5 text-indigo-600"></i>
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">抄錶日期:</span>
                        <span id="staticDate" class="text-xs font-bold text-slate-700 font-mono-data leading-none">-</span>
                    </div>
                </div>

                <!-- Department and Link -->
                <div class="flex items-center justify-center md:justify-end gap-3 px-1">
                    <p class="text-slate-500 font-bold flex items-center gap-1.5 text-[11px]">
                        <span class="inline-block w-1.5 h-1.5 bg-blue-500 rounded-full"></span>
                        運轉組
                    </p>
                    <a href="https://docs.google.com/spreadsheets/d/1-6NiRVNfLzVaqr6775STcrjdy9gyKiHHU1jNewiyUiY/edit?usp=sharing" 
                       target="_blank" 
                       class="text-blue-500 hover:text-blue-700 font-bold text-[10px] flex items-center gap-1 bg-blue-50 px-2 py-0.5 rounded border border-blue-100 transition-colors">
                        <i data-lucide="external-link" class="w-3 h-3"></i>
                        試算表
                    </a>
                </div>
            </div>
        </header>

        <!-- Main Display Container -->
        <div class="glass-card rounded-2xl border border-slate-200 overflow-hidden shadow-lg mb-4">
            <div id="loadingOverlay" class="py-12 flex flex-col items-center justify-center">
                <div class="w-8 h-8 border-3 border-blue-100 border-t-blue-600 rounded-full animate-spin mb-3"></div>
                <p class="text-slate-500 text-xs font-medium">即時數據讀取中...</p>
            </div>

            <!-- Desktop Table Mode: Visible on md screens and up -->
            <div class="hidden md:block overflow-x-auto no-scrollbar" id="desktopWrapper">
                <table class="w-full text-left border-collapse table-fixed">
                    <thead id="tableHead" class="bg-slate-50 border-b border-slate-200">
                        <!-- Headers -->
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-100 bg-white">
                        <!-- Rows -->
                    </tbody>
                </table>
            </div>

            <!-- Mobile Card Mode: Visible on small screens only -->
            <div class="block md:hidden p-3 space-y-3 hidden" id="mobileWrapper">
                <!-- Cards will be injected here -->
            </div>
        </div>
        
        <!-- Footer -->
        <footer class="mt-4 flex flex-col md:flex-row justify-between items-center px-1 gap-4">
            <div class="flex flex-wrap justify-center items-center gap-3">
                <div class="flex items-center gap-1"><span class="w-2.5 h-2.5 bg-slate-300 rounded-full"></span><span class="text-[10px] text-slate-500 font-bold">正常</span></div>
                <div class="flex items-center gap-1"><span class="w-2.5 h-2.5 bg-red-500 rounded-full"></span><span class="text-[10px] text-slate-500 font-bold">低時數</span></div>
                <div class="flex items-center gap-1"><span class="w-2.5 h-2.5 bg-blue-600 rounded-full"></span><span class="text-[10px] text-slate-500 font-bold">大修</span></div>
                <span class="hidden md:inline text-[10px] text-slate-300 mx-1">|</span>
                <span class="text-[10px] text-slate-400 font-bold">監控機組總數: <span id="totalCount" class="font-mono-data font-black text-slate-600">-</span></span>
            </div>
            <p class="text-[9px] text-slate-400 font-black uppercase tracking-tighter text-center">
                TPC JIAN-SHAN POWER PLANT · OPERATION DIVISION
            </p>
        </footer>
    </div>

    <script>
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRpop0v-zlk-fso9sTVe2gp-UxsJhGuANR0PF74psOZy3kTxVFhIg4R7EAhUk70FmMYO4jCeM27xE4v/pub?output=csv";
        
        const EXCLUDE_COLUMNS = ['廠別', '資訊更新日期', '本週抄錶日期(date)'];
        const TARGET_HOUR_COLUMN = '平均每日可運轉時數';
        const STATIC_DATE_COLUMN = '本週抄錶日期(date)';

        let rawData = [];
        let filteredHeaders = [];
        let columnMapping = [];

        async function fetchData() {
            showLoading(true);
            try {
                const response = await fetch(SHEET_CSV_URL);
                const csvText = await response.text();
                processCSV(csvText);
                document.getElementById('desktopWrapper').classList.remove('hidden');
                document.getElementById('mobileWrapper').classList.remove('hidden');
            } catch (error) {
                console.error("Fetch error", error);
            } finally {
                showLoading(false);
                lucide.createIcons();
            }
        }

        function processCSV(csvText) {
            const lines = csvText.split(/\r?\n/).filter(line => line.trim() !== "");
            if (lines.length < 2) return;

            const allHeaders = lines[0].split(',').map(h => h.replace(/^"|"$/g, '').trim());
            rawData = lines.slice(1).map(line => {
                const matches = line.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
                return (matches || line.split(',')).map(cell => cell.replace(/^"|"$/g, '').trim());
            });

            const dateIdx = allHeaders.indexOf(STATIC_DATE_COLUMN);
            if (dateIdx !== -1) document.getElementById('staticDate').textContent = rawData[0][dateIdx];

            columnMapping = [];
            filteredHeaders = [];
            allHeaders.forEach((h, index) => {
                if (!EXCLUDE_COLUMNS.includes(h)) {
                    columnMapping.push(index);
                    filteredHeaders.push(h);
                }
            });

            renderContent(rawData);
            document.getElementById('totalCount').textContent = rawData.length;
        }

        function renderContent(dataList) {
            renderDesktopTable(dataList);
            renderMobileCards(dataList);
        }

        function renderDesktopTable(dataList) {
            const thead = document.getElementById('tableHead');
            const tbody = document.getElementById('tableBody');
            const colWidth = 100 / filteredHeaders.length;

            thead.innerHTML = `<tr>${filteredHeaders.map(h => `
                <th style="width: ${colWidth}%" class="px-3 py-2 font-bold text-slate-400 text-[10px] uppercase tracking-tighter border-r border-slate-100 last:border-0">
                    ${h}
                </th>
            `).join('')}</tr>`;

            tbody.innerHTML = dataList.map(row => {
                const hourIdx = filteredHeaders.indexOf(TARGET_HOUR_COLUMN);
                const hourValue = row[columnMapping[hourIdx]] || "";
                const numValue = parseFloat(hourValue);
                
                let status = getStatus(hourValue, numValue);
                let rowHtml = `<tr class="hover:bg-blue-50/40 transition-colors">`;
                
                columnMapping.forEach((originalIdx, fIdx) => {
                    const headerName = filteredHeaders[fIdx];
                    const value = row[originalIdx] || '-';
                    let cellContent = value;
                    let cellClass = "px-3 py-1.5 text-[11px] border-r border-slate-50 last:border-0 break-all font-medium leading-tight";
                    
                    if (fIdx === 0) {
                        cellClass += " text-center";
                        let unitPillType = getUnitPillClass(status);
                        cellContent = `<span class="pill-status ${unitPillType}">${value}</span>`;
                    }

                    if (headerName === TARGET_HOUR_COLUMN) {
                        cellClass += " text-center";
                        let pillType = getPillClass(status);
                        cellContent = `<span class="pill-status ${pillType}">${value}</span>`;
                    }

                    rowHtml += `<td class="${cellClass}">${cellContent}</td>`;
                });

                return rowHtml + '</tr>';
            }).join('');
        }

        function renderMobileCards(dataList) {
            const container = document.getElementById('mobileWrapper');
            const hourIdxInFiltered = filteredHeaders.indexOf(TARGET_HOUR_COLUMN);

            container.innerHTML = dataList.map(row => {
                const hourValue = row[columnMapping[hourIdxInFiltered]] || "";
                const numValue = parseFloat(hourValue);
                const status = getStatus(hourValue, numValue);
                
                const unitName = row[columnMapping[0]];

                return `
                <div class="mobile-card bg-white border border-slate-200 rounded-xl p-3 shadow-sm">
                    <div class="flex justify-between items-center mb-2 pb-2 border-b border-slate-50">
                        <span class="pill-status ${getUnitPillClass(status)} scale-110">${unitName}</span>
                        <div class="text-right">
                            <p class="text-[9px] font-bold text-slate-400 uppercase leading-none mb-1">運轉時數</p>
                            <span class="pill-status ${getPillClass(status)}">${hourValue}</span>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-y-2 gap-x-4">
                        ${columnMapping.slice(1).map((originalIdx, fIdx) => {
                            const hName = filteredHeaders[fIdx + 1];
                            if (hName === TARGET_HOUR_COLUMN) return ''; // 已顯示在上方
                            return `
                            <div>
                                <p class="text-[9px] font-bold text-slate-400 uppercase leading-none mb-1">${hName}</p>
                                <p class="text-xs font-bold text-slate-700 font-mono-data">${row[originalIdx] || '-'}</p>
                            </div>
                            `;
                        }).join('')}
                    </div>
                </div>
                `;
            }).join('');
        }

        function getStatus(val, num) {
            if (val.includes('大修中')) return "maintenance";
            if (!isNaN(num) && num <= 4) return "low";
            return "normal";
        }

        function getPillClass(status) {
            if (status === "maintenance") return "pill-maintenance";
            if (status === "low") return "pill-low";
            return "pill-normal";
        }

        function getUnitPillClass(status) {
            if (status === "maintenance") return "pill-maintenance";
            if (status === "low") return "pill-low";
            return "pill-unit-normal";
        }

        function showLoading(isLoading) {
            document.getElementById('loadingOverlay').classList.toggle('hidden', !isLoading);
        }

        window.onload = fetchData;
    </script>
</body>
</html>
